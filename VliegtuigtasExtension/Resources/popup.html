<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vliegtuigtas Check</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="header">
    <h1>Past mijn tas?</h1>
    <p class="subtitle">Check de handbagageregels voor de tas die je nu bekijkt.</p>
  </header>

  <main>
    <section id="product" class="product hidden">
      <img id="productImage" class="product-image hidden" alt="" />
      <div class="product-info">
        <p id="productName" class="product-name"></p>
        <p id="autoDetectNote" class="note hidden"></p>
      </div>
    </section>

    <section class="field">
      <label for="airline">Maatschappij</label>
      <select id="airline" disabled>
        <option value="">Laden…</option>
      </select>
    </section>

    <section class="dims">
      <div class="field small">
        <label for="length">Hoogte</label>
        <div class="input-unit">
          <input id="length" type="number" inputmode="decimal" min="0" step="1" />
          <span>cm</span>
        </div>
      </div>
      <div class="field small">
        <label for="width">Breedte</label>
        <div class="input-unit">
          <input id="width" type="number" inputmode="decimal" min="0" step="1" />
          <span>cm</span>
        </div>
      </div>
      <div class="field small">
        <label for="depth">Diepte</label>
        <div class="input-unit">
          <input id="depth" type="number" inputmode="decimal" min="0" step="1" />
          <span>cm</span>
        </div>
      </div>
      <div class="field small">
        <label for="weight">Gewicht</label>
        <div class="input-unit">
          <input id="weight" type="number" inputmode="decimal" min="0" step="0.1" />
          <span>kg</span>
        </div>
      </div>
    </section>

    <button id="checkButton" disabled>Controleer nu</button>

    <section id="result" class="result hidden" aria-live="polite"></section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
